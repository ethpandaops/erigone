name: Check and Update Patches

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all patches'
        required: false
        default: false
        type: boolean

jobs:
  discover-patches:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover patch targets
        id: discover
        uses: ./.github/actions/discover-patches

  check-patch:
    needs: discover-patches
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.discover-patches.outputs.matrix)}}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Run erigone build for ${{ matrix.org }}/${{ matrix.repo }} ${{ matrix.ref }}
        id: build
        run: |
          echo "Building ${{ matrix.org }}/${{ matrix.repo }} on ref ${{ matrix.ref }}"

          # Run the build script in CI mode
          ./scripts/erigone-build.sh -r "${{ matrix.org }}/${{ matrix.repo }}" -b "${{ matrix.ref }}" --ci

          # Check if patches were updated
          if git diff --quiet patches/; then
            echo "patch_changed=false" >> $GITHUB_OUTPUT
            echo "No changes to patches"
          else
            echo "patch_changed=true" >> $GITHUB_OUTPUT
            echo "Patches have been updated"

            # Get the commit hash of the upstream repo that was built
            cd erigon
            COMMIT_HASH=$(git rev-parse --short HEAD)
            cd ..
            echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          fi

      - name: Upload updated patches as artifact
        if: steps.build.outputs.patch_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: patches-${{ matrix.org }}-${{ matrix.repo }}-${{ matrix.ref }}
          path: patches/${{ matrix.org }}/${{ matrix.repo }}/${{ matrix.ref }}/

      - name: Save patch metadata
        if: steps.build.outputs.patch_changed == 'true'
        run: |
          mkdir -p patch-metadata
          echo "{
            \"org\": \"${{ matrix.org }}\",
            \"repo\": \"${{ matrix.repo }}\",
            \"ref\": \"${{ matrix.ref }}\",
            \"commit_hash\": \"${{ steps.build.outputs.commit_hash }}\"
          }" > patch-metadata/${{ matrix.org }}-${{ matrix.repo }}-${{ matrix.ref }}.json

      - name: Upload patch metadata
        if: steps.build.outputs.patch_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.org }}-${{ matrix.repo }}-${{ matrix.ref }}
          path: patch-metadata/${{ matrix.org }}-${{ matrix.repo }}-${{ matrix.ref }}.json

  update-and-release:
    needs: check-patch
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all patch artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Process updated patches
        id: process
        run: |
          PATCHES_UPDATED=false
          RELEASE_NOTES=""

          for artifact_dir in artifacts/patches-*; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing $artifact_dir"

              # Read metadata to get correct ref name
              artifact_name=$(basename "$artifact_dir")
              # Find matching metadata
              metadata_dir="${artifact_dir/patches-/metadata-}"
              metadata_dir="artifacts/$(basename "$metadata_dir")"

              if [ -d "$metadata_dir" ]; then
                for mf in "$metadata_dir"/*.json; do
                  if [ -f "$mf" ]; then
                    org=$(jq -r '.org' "$mf")
                    repo=$(jq -r '.repo' "$mf")
                    ref=$(jq -r '.ref' "$mf")
                    commit_hash=$(jq -r '.commit_hash' "$mf")

                    dest_dir="patches/$org/$repo/$ref"
                    mkdir -p "$dest_dir"
                    cp "$artifact_dir"/*.patch "$dest_dir/"

                    PATCHES_UPDATED=true
                    RELEASE_NOTES="${RELEASE_NOTES}- Updated patches for ${org}/${repo} ${ref} (commit: ${commit_hash})\n"
                  fi
                done
              fi
            fi
          done

          echo "patches_updated=$PATCHES_UPDATED" >> $GITHUB_OUTPUT
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit updated patches
        if: steps.process.outputs.patches_updated == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add patches/
          git commit -m "Update patches [skip ci]

          ${{ steps.process.outputs.release_notes }}"

          git push

      - name: Create release for each updated patch
        if: steps.process.outputs.patches_updated == 'true'
        run: |
          for metadata_dir in artifacts/metadata-*; do
            if [ -d "$metadata_dir" ]; then
              for metadata_file in "$metadata_dir"/*.json; do
                if [ -f "$metadata_file" ]; then
                  org=$(jq -r '.org' "$metadata_file")
                  repo=$(jq -r '.repo' "$metadata_file")
                  ref=$(jq -r '.ref' "$metadata_file")
                  commit_hash=$(jq -r '.commit_hash' "$metadata_file")

                  tag_name="${org}-${repo}-${ref}-${commit_hash}"

                  release_body="Automated patch update for ${org}/${repo} on ref ${ref}

                  Built from upstream commit: ${commit_hash}

                  This release contains the updated patch files."

                  gh release create "$tag_name" \
                    --title "Patch Update: ${org}/${repo} ${ref} (${commit_hash})" \
                    --notes "$release_body" \
                    patches/${org}/${repo}/${ref}/*.patch || echo "Release $tag_name may already exist"
                fi
              done
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
