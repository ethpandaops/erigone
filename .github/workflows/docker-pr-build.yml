name: Build Docker Image on PR

on:
  pull_request:
    types: [labeled, synchronize]

env:
  DOCKER_REPO: ethpandaops/erigone

jobs:
  discover-targets:
    # Run when 'build-image' label is present
    if: |
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'build-image'))
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover patch targets
        id: discover
        uses: ./.github/actions/discover-patches

  build-and-push:
    needs: discover-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.discover-targets.outputs.matrix)}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract PR information
        id: pr_info
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: Build patched upstream (${{ matrix.ref }})
        run: |
          ./scripts/erigone-build.sh -r "${{ matrix.org }}/${{ matrix.repo }}" -b "${{ matrix.ref }}" --ci --skip-build

      - name: Determine build tags
        id: build_config
        run: |
          BUILD_TAGS="embedded,nosqlite,noboltdb,nosilkworm"
          if [ "${{ matrix.ref }}" = "main" ]; then
            BUILD_TAGS="${BUILD_TAGS},erigon_main"
          fi
          echo "build_tags=${BUILD_TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push erigone image (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./erigon
          file: ./erigon/Dockerfile.ethpandaops
          build-args: |
            VERSION=${{ steps.pr_info.outputs.short_sha }}
            VCS_REF=${{ steps.pr_info.outputs.commit_sha }}
            BUILD_DATE=${{ steps.pr_info.outputs.build_date }}
            BUILD_TAGS=${{ steps.build_config.outputs.build_tags }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_REPO }}:pr-${{ steps.pr_info.outputs.pr_number }}-${{ steps.pr_info.outputs.short_sha }}-${{ matrix.ref }}
            ${{ env.DOCKER_REPO }}:${{ steps.pr_info.outputs.commit_sha }}-${{ matrix.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR with Docker image info
        uses: actions/github-script@v7
        if: github.event.action == 'labeled'
        with:
          script: |
            const prNumber = '${{ steps.pr_info.outputs.pr_number }}';
            const shortSha = '${{ steps.pr_info.outputs.short_sha }}';
            const commitSha = '${{ steps.pr_info.outputs.commit_sha }}';
            const ref = '${{ matrix.ref }}';
            const dockerRepo = process.env.DOCKER_REPO;
            const dockerTag = `pr-${prNumber}-${shortSha}-${ref}`;

            const comment = `## Docker Image Built (${ref})

            Multi-architecture (amd64/arm64) image has been built and pushed to Docker Hub:

            **Repository**: \`${dockerRepo}\`
            **Upstream ref**: \`${ref}\`
            **Tags**:
            - \`${dockerTag}\`
            - \`${commitSha}-${ref}\`

            ### Usage
            \`\`\`bash
            docker pull ${dockerRepo}:${dockerTag}
            docker run ${dockerRepo}:${dockerTag} --help
            \`\`\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
